# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

INHERIT: base.yml

plugins:
  - search
  - awesome-pages
  - glightbox
  - offline
  - social
  - charts
  # git-committers disabled for the ggkchen fork: it makes one GitHub API call
  # per page, and a cold-cache build of this many pages exhausts the rate limit
  # (unauth 60/hr; GITHUB_TOKEN 1000/hr). Re-enable with a PAT (5000/hr) + a
  # committed .cache if you want per-page author avatars back.
  # - git-committers:
  #     repository: ggkchen/cca
  #     branch: main
  #     token: !ENV ["MKDOCS_GIT_COMMITTERS_APIKEY"]
  - git-revision-date-localized:
      enable_creation_date: true
  - rss:
      length: -1
  - open-in-new-tab
  - print-site:
      toc_depth: 6

extra:
  analytics:
    provider: custom
